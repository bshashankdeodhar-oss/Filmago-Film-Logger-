<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Filmago</title>
    <script src="auth.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #FF4500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Noise Texture Overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0.05;
            mix-blend-mode: overlay;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        }

        /* Hover image effects */
        .poster-wrapper:hover img {
            transform: scale(1.05);
        }

        .poster-wrapper img {
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-[#050505] selection:bg-[#FF4500] selection:text-white pb-32">
        <div class="noise-overlay"></div>

        <!-- Navigation -->
        <nav id="main-nav"
            class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 py-4 bg-[#050505]/90 backdrop-blur-md border-b border-white/5">
            <div class="container mx-auto px-6 flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold tracking-tighter font-serif">
                    Filmago.
                </a>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="search.html"
                        class="text-sm text-gray-400 hover:text-white transition-colors duration-300">Search</a>
                    <a href="profile.html"
                        class="text-sm text-white hover:text-white transition-colors duration-300 border-b border-[#FF4500] pb-1">Profile</a>
                    <a href="timeline.html"
                        class="text-sm text-gray-400 hover:text-white transition-colors duration-300">Timeline</a>
                </div>

                <a href="profile.html"
                    class="w-10 h-10 rounded-full overflow-hidden border border-[#FF4500] transition-colors">
                    <img src="https://ui-avatars.com/api/?name=User&background=111&color=fff" alt="User"
                        class="w-full h-full object-cover">
                </a>
            </div>
        </nav>

        <!-- Header Banner Section -->
        <div class="pt-32 pb-12 border-b border-white/5 relative">
            <div class="absolute inset-0 z-0 opacity-20 bg-gradient-to-b from-[#FF4500]/20 to-transparent"></div>

            <div
                class="container mx-auto px-6 max-w-5xl relative z-10 flex flex-col md:flex-row items-center md:items-start gap-8">
                <!-- Avatar -->
                <div id="avatar-container"
                    class="relative group cursor-pointer w-32 h-32 md:w-40 md:h-40 shrink-0 rounded-full overflow-hidden border-4 border-white/10 shadow-[0_0_30px_rgba(255,69,0,0.2)]">
                    <img id="profile-avatar"
                        src="https://ui-avatars.com/api/?name=User&background=111&color=fff&size=200" alt="User Avatar"
                        class="w-full h-full object-cover group-hover:opacity-50 transition-opacity">
                    <div
                        class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                        <iconify-icon icon="lucide:camera" class="text-white text-2xl drop-shadow-lg"></iconify-icon>
                    </div>
                </div>
                <input type="file" id="avatar-input" accept="image/*" class="hidden">

                <!-- Info -->
                <div class="flex-grow text-center md:text-left">
                    <div class="flex flex-col md:flex-row md:items-center gap-4 mb-2">
                        <h1 id="profile-name" class="text-3xl md:text-5xl font-serif">Cinephile99</h1>
                        <button id="btn-edit-profile"
                            class="mx-auto md:mx-0 px-6 py-1.5 rounded-full border border-white/20 text-sm font-medium hover:bg-white hover:text-black transition-colors shadow-lg">Edit
                            Profile</button>
                    </div>
                    <p id="profile-bio" class="text-gray-400 mb-6 font-light max-w-lg mx-auto md:mx-0 leading-relaxed">
                        Watching the
                        shadows dance on the wall since 1999. In pursuit of the perfect tracking shot. Obsessed with
                        A24, Fincher, and anything shot on 35mm.</p>

                    <!-- Stats Grid -->
                    <div class="flex flex-wrap justify-center md:justify-start gap-8 md:gap-12">
                        <div>
                            <p id="stat-films" class="text-3xl font-serif text-white">0</p>
                            <p class="text-xs uppercase tracking-widest text-[#FF4500] font-bold mt-1">Films</p>
                        </div>
                        <div>
                            <p id="stat-year" class="text-3xl font-serif text-white">0</p>
                            <p class="text-xs uppercase tracking-widest text-[#FF4500] font-bold mt-1">This Year</p>
                        </div>
                        <div>
                            <p id="stat-reviews" class="text-3xl font-serif text-white">0</p>
                            <p class="text-xs uppercase tracking-widest text-[#FF4500] font-bold mt-1">Reviews</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-6 max-w-5xl mt-16 flex flex-col lg:flex-row gap-16">

            <!-- Left Column: Main Diary Activity -->
            <div class="flex-grow w-full lg:w-2/3">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-serif">Recent Diary</h2>
                </div>

                <div class="space-y-6" id="diary-container">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Right Column: Favorites & Sidebar -->
            <div class="w-full lg:w-1/3">
                <div class="mb-12">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-sm uppercase tracking-[0.2em] font-bold text-gray-500">Favorite Films</h2>
                    </div>

                    <div id="favorites-grid" class="grid grid-cols-2 gap-4"></div>
                </div>

                <!-- Watchlist Teaser -->
                <div>
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-sm uppercase tracking-[0.2em] font-bold text-gray-500">Watchlist Queue</h2>
                        <a href="watchlist.html" class="text-sm text-[#FF4500] hover:text-white">See All</a>
                    </div>
                    <div id="watchlist-teaser" class="bg-[#111] rounded-xl border border-white/5 p-4 space-y-3"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="movies.js"></script>
    <script src="tmdb.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Hydrate diary list
            const diary = getDiary();
            const diaryContainer = document.getElementById('diary-container');
            const currentYear = new Date().getFullYear();

            // Profile hydration
            const profileData = getProfile();
            document.getElementById('profile-name').textContent = profileData.name;
            document.getElementById('profile-bio').textContent = profileData.bio;
            const profileAvatar = document.getElementById('profile-avatar');
            if (profileAvatar) profileAvatar.src = profileData.avatar;

            // Handle Avatar Upload
            const avatarContainer = document.getElementById('avatar-container');
            const avatarInput = document.getElementById('avatar-input');

            if (avatarContainer && avatarInput) {
                avatarContainer.addEventListener('click', () => {
                    avatarInput.click();
                });

                avatarInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function (event) {
                            const base64String = event.target.result;
                            profileAvatar.src = base64String;

                            // Save to profile and trigger optimistic sync
                            const currentProfile = getProfile();
                            currentProfile.avatar = base64String;
                            saveProfile(currentProfile);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            // Stats
            document.getElementById('stat-films').textContent = diary.length;
            document.getElementById('stat-year').textContent = diary.filter(d => d.date.startsWith(currentYear)).length;
            document.getElementById('stat-reviews').textContent = diary.filter(d => d.review && d.review.length > 0).length;

            // Favorite / watchlist summary
            const watchlist = getWatchlist();
            const favoritesGrid = document.getElementById('favorites-grid');
            const watchlistTeaser = document.getElementById('watchlist-teaser');

            function renderFavorites() {
                const favorites = getFavorites();
                favoritesGrid.innerHTML = favorites.length > 0 ? '' : '<p class="text-gray-500 col-span-2">No favorites yet. Mark favorites from search or details.</p>';
                favorites.forEach(movie => {
                    const item = document.createElement('div');
                    item.className = 'poster-wrapper block rounded-lg overflow-hidden border border-white/10 shadow-lg aspect-[2/3] relative group cursor-pointer';
                    item.innerHTML = `
                        <img src="${movie.poster}" class="w-full h-full object-cover" alt="${movie.title}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3">
                            <span class="text-xs text-white uppercase tracking-wider font-bold truncate">${movie.title}</span>
                        </div>
                        <button class="remove-fav-btn absolute top-2 right-2 w-7 h-7 bg-black/60 hover:bg-red-600 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-10" title="Remove from favorites">
                            <iconify-icon icon="lucide:x" class="text-white text-sm"></iconify-icon>
                        </button>
                    `;

                    item.addEventListener('click', () => {
                        window.location.href = 'details.html?id=' + movie.id;
                    });

                    const removeBtn = item.querySelector('.remove-fav-btn');
                    removeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeFromFavorites(movie.id);
                        renderFavorites();
                    });

                    favoritesGrid.appendChild(item);
                });
            }
            renderFavorites();

            watchlistTeaser.innerHTML = watchlist.length > 0 ? '' : '<p class="text-gray-500">Your watchlist is empty. Add films to start planning your queue.</p>';
            watchlist.forEach(movie => {
                const block = document.createElement('div');
                block.className = 'flex items-center gap-3';
                block.innerHTML = `
                    <img src="${movie.poster}" class="w-8 aspect-[2/3] object-cover rounded shadow" alt="${movie.title}">
                    <div>
                        <h4 class="text-sm font-serif text-white">${movie.title}</h4>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">${movie.year || ''}</p>
                    </div>
                `;
                watchlistTeaser.appendChild(block);
            });

            document.getElementById('btn-edit-profile').addEventListener('click', () => {
                const name = prompt('Enter your display name:', profileData.name);
                const bio = prompt('Write a short bio:', profileData.bio);
                if (name !== null && bio !== null) {
                    const updated = { ...profileData, name: name.trim() || 'Cinephile99', bio: bio.trim() || profileData.bio };
                    saveProfile(updated);
                    profileData.name = updated.name;
                    profileData.bio = updated.bio;
                    document.getElementById('profile-name').textContent = updated.name;
                    document.getElementById('profile-bio').textContent = updated.bio;
                }
            });

            if (diary.length === 0) {
                diaryContainer.innerHTML = `<p class="text-gray-500">No films logged yet. Search for a film to start your diary.</p>`;
            } else {
                diaryContainer.innerHTML = '';
                diary.forEach(entry => {
                    const starsHTML = Array(5).fill(0).map((_, i) =>
                        `<iconify-icon icon="lucide:star" class="${i < entry.rating ? 'text-[#FF4500]' : 'text-gray-700'}"></iconify-icon>`
                    ).join('');

                    const heartHTML = entry.liked ?
                        `<iconify-icon icon="mingcute:heart-fill" class="text-red-500 text-sm"></iconify-icon>` : '';

                    diaryContainer.innerHTML += `
                        <div class="flex gap-4 group">
                            <a href="details.html?id=${entry.movie.id}" data-id="${entry.movie.id}"
                                class="w-20 shrink-0 poster-wrapper rounded-md overflow-hidden aspect-[2/3] border border-white/10 relative">
                                <img src="${entry.movie.poster}" alt="Poster"
                                    class="w-full h-full object-cover">
                                <div
                                    class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <iconify-icon icon="lucide:eye" class="text-white text-xl"></iconify-icon>
                                </div>
                            </a>
                            <div class="flex flex-col py-1 flex-grow border-b border-white/5 pb-6">
                                <div class="flex items-start justify-between mb-1">
                                    <div>
                                        <h3 class="font-serif text-lg text-white hover:text-[#FF4500] transition-colors"><a
                                                href="details.html?id=${entry.movie.id}" class="tmdb-title">${entry.movie.title}</a> <span
                                                class="text-gray-500 text-sm font-sans mx-1 tmdb-year">${entry.movie.year}</span></h3>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs text-gray-500 font-mono">${new Date(entry.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>
                                        <button onclick="if(confirm('Delete this diary entry?')) { removeDiaryEntry('${entry.logDate}'); window.location.reload(); }" class="text-gray-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="Delete entry"><iconify-icon icon="lucide:trash-2"></iconify-icon></button>
                                    </div>
                                </div>

                                <div class="flex items-center gap-2 mb-3">
                                    ${heartHTML}
                                    <div class="flex gap-0.5 text-[#FF4500] text-xs">
                                        ${starsHTML}
                                    </div>
                                </div>

                                ${entry.review ? `<p class="text-gray-400 text-sm font-light leading-relaxed mb-4">${entry.review}</p>` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            // Hydrate favorite grid cards
            document.querySelectorAll('.tmdb-hydrate-card').forEach(async (card) => {
                const id = card.getAttribute('data-id');
                const movie = await getMovieDetailsAPI(id);
                if (movie) {
                    const img = card.querySelector('img');
                    const span = card.querySelector('span');
                    if (img) img.src = movie.poster;
                    if (span) span.textContent = movie.title;
                }
            });
        });
    </script>
</body>

</html>
