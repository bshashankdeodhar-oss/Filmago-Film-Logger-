<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Filmago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0.05;
            mix-blend-mode: overlay;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="w-full max-w-md p-8 bg-[#111] border border-white/10 rounded-2xl shadow-2xl relative z-20 mt-10 mb-10">
        <div class="text-center mb-10">
            <a href="index.html" class="text-3xl font-bold tracking-tighter font-serif">Filmago.</a>
        </div>
        <h2 class="text-xl text-center mb-8 font-light text-gray-300">Join the cinematic universe.</h2>
        <form id="signup-form" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Username</label>
                <input type="text" id="username" required
                    class="w-full bg-black/50 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF4500] transition-colors">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                <input type="email" id="email" required
                    class="w-full bg-black/50 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF4500] transition-colors">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2">Password</label>
                <input type="password" id="password" required
                    class="w-full bg-black/50 border border-white/20 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF4500] transition-colors">
            </div>
            <button type="submit"
                class="w-full bg-[#FF4500] hover:bg-white hover:text-black py-3 rounded-lg text-sm font-medium transition-colors">Create
                Account</button>
        </form>
        <p class="text-center mt-8 text-sm text-gray-500">Already have an account? <a href="login.html"
                class="text-white hover:text-[#FF4500] transition-colors">Log In</a></p>
    </div>

    <script src="movies.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = "Creating Account...";
            btn.disabled = true;

            if (await signupUserAPI(username, email, password)) {
                window.location.href = 'index.html';
            } else {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
